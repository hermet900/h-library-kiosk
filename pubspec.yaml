name: h_library_kiosk
description: "Multi-Kiosk Movie & Music Distribution System with Offline Features"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & State Management
  cupertino_icons: ^1.0.2
  provider: ^6.0.0
  get: ^4.6.5
  
  # Database
  sqflite: ^2.2.8
  path: ^1.8.3
  path_provider: ^2.0.15
  
  # Media & File Management
  file_picker: ^5.3.3
  media_scanner: ^1.2.1
  video_player: ^2.7.2
  audioplayers: ^5.2.1
  
  # USB/OTG Support
  usb_serial: ^0.5.0
  
  # Audio Fingerprinting
  audio_waveforms: ^1.0.5
  fftea: ^0.0.10
  
  # Networking (for Mobile Money API)
  http: ^1.1.0
  dio: ^5.3.1
  
  # Security & Encryption
  encrypt: ^4.0.3
  
  # Image & Video Processing
  image: ^4.0.17
  
  # Format Conversion
  ffmpeg_kit_flutter: ^5.1.0
  
  # UI Utilities
  intl: ^0.19.0
  animations: ^2.0.7
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/db/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
